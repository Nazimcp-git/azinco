<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – Azinco Interiors</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="shortcut icon" href="../images/icon.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

  <!-- ════════════════════════════════════ -->
  <!-- LOGIN SCREEN                         -->
  <!-- ════════════════════════════════════ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <img src="../images/sofa.png" alt="Azinco" class="logo">
      <h2>Admin Login</h2>
      <p class="subtitle">Sign in to manage products</p>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
      </form>
    </div>
  </div>

  <!-- ════════════════════════════════════ -->
  <!-- DASHBOARD                            -->
  <!-- ════════════════════════════════════ -->
  <div class="dashboard" id="dashboard">

    <!-- Header -->
    <div class="dash-header">
      <img src="../images/sofa.png" alt="Azinco" class="logo">
      <div class="dash-header-right">
        <span class="admin-badge">Admin</span>
        <button class="btn btn-secondary" id="logoutBtn">Logout</button>
      </div>
    </div>

    <!-- Content -->
    <div class="dash-content">

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="upload">Upload Product</button>
        <button class="tab-btn" data-tab="products">All Products</button>
      </div>

      <!-- ── Upload Tab ──────────────── -->
      <div class="tab-panel active" id="tab-upload">
        <div class="upload-card">
          <h3>Upload New Product</h3>
          <form id="uploadForm">
            <div class="drop-zone" id="dropZone">
              <span class="drop-icon">📁</span>
              <span id="dropText">Drag & drop image here, or click to select</span>
              <input type="file" id="productImage" accept="image/jpeg,image/png,image/webp" style="display:none">
            </div>
            <div id="imagePreview"></div>
            <div class="progress-wrapper" id="progressWrapper">
              <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
              </div>
              <div class="progress-text" id="progressText"></div>
            </div>
            <div class="form-group">
              <label for="productTitle">Title *</label>
              <input type="text" id="productTitle" placeholder="e.g. Premium L-Shape Sofa" required>
            </div>
            <div class="form-group">
              <label for="productDescription">Description</label>
              <textarea id="productDescription" placeholder="Optional product description"></textarea>
            </div>
            <div class="form-group">
              <label for="productCategory">Category</label>
              <select id="productCategory">
                <option value="">Select category</option>
                <option value="sofa">Sofa</option>
                <option value="interior">Interior</option>
                <option value="bedroom">Bedroom</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <div style="display:flex;gap:10px">
              <button type="submit" class="btn btn-primary" id="uploadBtn" style="flex:2">Upload Product</button>
              <button type="button" class="btn btn-secondary" id="clearForm" style="flex:1">Clear</button>
              <button type="button" class="btn btn-secondary" id="retryBtn" style="display:none;flex:1">Retry</button>
            </div>
          </form>
        </div>
      </div>

      <!-- ── Products Tab ────────────── -->
      <div class="tab-panel" id="tab-products">
        <div class="table-card">
          <h3>All Products</h3>
          <table class="products-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Details</th>
                <th>Category</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr><td colspan="5" style="text-align:center;padding:30px;color:#888;">Loading…</td></tr>
            </tbody>
          </table>
          <div class="pagination">
            <button id="prevPage">← Prev</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextPage">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════ -->
  <!-- EDIT MODAL                           -->
  <!-- ════════════════════════════════════ -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-card">
      <h3>Edit Product</h3>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editTitle">Title</label>
          <input type="text" id="editTitle" required>
        </div>
        <div class="form-group">
          <label for="editDescription">Description</label>
          <textarea id="editDescription"></textarea>
        </div>
        <div class="form-group">
          <label for="editCategory">Category</label>
          <select id="editCategory">
            <option value="">None</option>
            <option value="sofa">Sofa</option>
            <option value="interior">Interior</option>
            <option value="bedroom">Bedroom</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <button type="button" class="btn btn-secondary" id="closeEditModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ════════════════════════════════════ -->
  <!-- SCRIPTS — No frameworks, no SDK      -->
  <!-- ════════════════════════════════════ -->
  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/image-utils.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-upload.js"></script>
  <script src="../js/admin-products.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      AdminAuth.init();
    });

    // Tab switching
    document.querySelectorAll(".tab-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.remove("active"); });
        document.querySelectorAll(".tab-panel").forEach(function (p) { p.classList.remove("active"); });
        btn.classList.add("active");
        var panel = document.getElementById("tab-" + btn.getAttribute("data-tab"));
        if (panel) panel.classList.add("active");
      });
    });
  </script>
</body>
</html>
